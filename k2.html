<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบผลการเรียน อนุบาล 2</title>

<style>
body{font-family:Arial;background:#f5f6fa;text-align:center;}
.container{width:700px;max-width:90%;margin:80px auto;background:white;padding:30px;box-shadow:0 0 15px rgba(0,0,0,0.1);border-radius:10px;}
input{padding:10px;width:70%;font-size:16px;}
button{padding:10px 20px;background:#1976d2;color:white;border:none;border-radius:6px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:10px;}
th{background:#228B22;color:white;}

td:first-child{
  text-align:left;
  padding-left:15px;
}

.rank-text{margin-top:20px;font-size:20px;font-weight:bold;text-align:left;}
.message{margin-top:20px;color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="container">
<h2>📘 ตรวจสอบผลการเรียน อนุบาล 2</h2>

<input type="text" id="studentId" placeholder="กรอกเลขบัตรประชาชน">
<br><br>
<button onclick="searchStudent()">ค้นหา</button>

<div id="result" style="display:none;">
<p id="studentName"></p>
<p id="studentYear"></p>

<table id="gradeTable" style="display:none;">
<thead>
<tr><th>ชื่อวิชา</th><th>คะแนน</th></tr>
</thead>
<tbody id="gradeTableBody"></tbody>
</table>

<div class="rank-text" id="studentRank"></div>
<div class="message" id="messageBox"></div>
</div>
</div>

<script>
function normalizeId(id){
const map={"๐":"0","๑":"1","๒":"2","๓":"3","๔":"4","๕":"5","๖":"6","๗":"7","๘":"8","๙":"9"};
return String(id).trim().replace(/\s+/g,"").replace(/[๐-๙]/g,d=>map[d]);
}

async function searchStudent(){
const inputId=normalizeId(document.getElementById("studentId").value);

const result=document.getElementById("result");
const table=document.getElementById("gradeTable");
const body=document.getElementById("gradeTableBody");
const name=document.getElementById("studentName");
const year=document.getElementById("studentYear");
const rank=document.getElementById("studentRank");
const msg=document.getElementById("messageBox");

result.style.display="block";
table.style.display="none";
body.innerHTML="";
name.innerText="";
year.innerText="";
rank.innerText="";
msg.innerText="";

if(!inputId){msg.innerText="กรุณากรอกรหัสนักเรียน";return;}

try{
const res=await fetch("data/k2.json");
const data=await res.json();

const studentData=data.filter(i=>normalizeId(i.id)===inputId && i.subject_name!=="คะแนนรวม");

if(studentData.length===0){msg.innerText="❌ ไม่พบข้อมูลนักเรียน";return;}

const s=studentData[0];

name.innerText=`ชื่อ: ${s.name} ชั้น: ${s.year_room}`;
year.innerText="ภาคเรียนที่ 2 ปีการศึกษา 2568";

studentData.forEach(i=>{
body.innerHTML+=`<tr><td>${i.subject_name}</td><td>${i.score}</td></tr>`;
});

body.innerHTML+=`<tr style="font-weight:bold;background:#eee;"><td>คะแนนรวม</td><td>${s.total_score}</td></tr>`;

table.style.display="table";
rank.innerText=`อันดับที่/ห้อง : ${s.class_rank}/${s.total_students}`;

}catch(e){msg.innerText="โหลดข้อมูลผิดพลาด";}
}
</script>

</body>
</html>
