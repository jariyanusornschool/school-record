<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบผลการเรียน อนุบาล 1</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f6fa;
      text-align:center;
      margin:0;
      padding:0;
    }

    .container{
      width:700px;
      max-width:90%;
      margin:80px auto;
      background:white;
      padding:30px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      border-radius:10px;
    }

    input{
      padding:10px;
      width:70%;
      font-size:16px;
      margin-bottom:10px;
    }

    button{
      padding:10px 20px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#125ea7;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px 8px;
    }

    th{
      background:#228B22;
      color:white;
    }

    .info{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
    }

    .semester{
      margin-top:10px;
      font-size:18px;
    }

    .rank-text{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#222;
    }

    .message{
      margin-top:20px;
      font-size:18px;
      color:red;
      font-weight:bold;
    }

    .logo{
      width:120px;
      margin-bottom:15px;
      border-radius:50%;
    }

    /* หัวตาราง (ชื่อวิชา) ให้อยู่กลาง */
    th:nth-child(1){
      text-align:center;
    }

    /* ข้อมูลในตาราง (ชื่อวิชา) ให้ชิดซ้าย */
    td:nth-child(1){
      text-align:left;
      padding-left:15px;
    }
  </style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo" alt="โลโก้โรงเรียน">
  <h2>📘 ตรวจสอบผลการเรียน อนุบาล 1</h2>

  <input type="text" id="studentId" placeholder="กรอกเลขบัตรประชาชน / รหัสนักเรียน">
  <br>
  <button onclick="searchStudent()">ค้นหา</button>

  <div id="result" style="display:none;">

    <!-- บรรทัดแรกใต้ปุ่มค้นหา -->
    <div class="info">
      <p id="studentName"></p>
    </div>

    <!-- บรรทัดถัดมา -->
    <div class="semester">
      <p id="studentYear"></p>
    </div>

    <table id="gradeTable" style="display:none;">
      <thead>
        <tr>
          <th>ชื่อวิชา</th>
          <th>คะแนน</th>
        </tr>
      </thead>
      <tbody id="gradeTableBody"></tbody>
    </table>

    <!-- อันดับไว้นอกตาราง -->
    <div class="rank-text" id="studentRank"></div>

    <!-- ข้อความแจ้งเตือน -->
    <div class="message" id="messageBox"></div>

  </div>
</div>

<script>
async function searchStudent() {
  const inputId = document.getElementById("studentId").value.trim();

  const resultDiv = document.getElementById("result");
  const gradeTable = document.getElementById("gradeTable");
  const tableBody = document.getElementById("gradeTableBody");
  const studentNameEl = document.getElementById("studentName");
  const studentYearEl = document.getElementById("studentYear");
  const studentRankEl = document.getElementById("studentRank");
  const messageBox = document.getElementById("messageBox");

  // reset ค่าเดิม
  resultDiv.style.display = "block";
  gradeTable.style.display = "none";
  tableBody.innerHTML = "";
  studentNameEl.innerText = "";
  studentYearEl.innerText = "";
  studentRankEl.innerText = "";
  messageBox.innerText = "";

  if (!inputId) {
    messageBox.innerText = "กรุณากรอกรหัสนักเรียน";
    return;
  }

  try {
    const response = await fetch("data/k1.json");

    if (!response.ok) {
      throw new Error("ไม่สามารถโหลดไฟล์ JSON ได้");
    }

    const data = await response.json();
    const studentData = data.filter(item => String(item.id) === inputId);

    if (studentData.length === 0) {
      messageBox.innerText = "❌ ไม่พบข้อมูลนักเรียน";

    }

    
    const student = studentData[0];

    // บรรทัดแรกใต้ปุ่มค้นหา: ชื่อนักเรียน + ระดับชั้น
    studentNameEl.innerText = `ชื่อ: ${student.name}   ชั้น: ${student.year_room}`;

    // บรรทัดถัดมา
    studentYearEl.innerText = "ภาคเรียนที่ 2 ปีการศึกษา 2568";

    // แสดงตารางเกรด
    studentData.forEach(item => {
      const row = `
        <tr>
          <td>${item.subject_name}</td>
          <td>${item.score}</td>
        </tr>
      `;
      // แถวคะแนนรวม (ต้องอยู่นอก loop)
      const totalScore = student.total_score;

      const totalRow = `
      <tr style="font-weight:bold; background:#f1f1f1;">
        <td>คะแนนรวม</td>
        <td>${totalScore}</td>
      </tr>
      `;
      tableBody.innerHTML += row;
    });

    gradeTable.style.display = "table";

    // แสดงอันดับนอกตาราง
    studentRankEl.innerText = `อันดับที่ ${student.class_rank}/${student.total_students}`;

  } catch (error) {
    messageBox.innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
    console.error(error);
  }
}
</script>

</body>
</html>
