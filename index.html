<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจสอบผลการเรียน</title>

  <style>
    body{
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      margin:0;
      padding:0;
      text-align:center;
    }

    .container{
      width:900px;
      max-width:95%;
      margin:60px auto;
      background:white;
      padding:40px 20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      border-radius:16px;
    }

    .logo{
      width:120px;
      margin-bottom:15px;
    }

    h1{
      margin-bottom:10px;
      font-size:32px;
      color:#333;
    }

    .subtitle{
      color:#777;
      margin-bottom:30px;
    }

    .section{
      margin-top:30px;
    }

    .section h2{
      margin-bottom:15px;
      font-size:20px;
      color:#444;
    }

    .menu a{
      padding:12px 18px;
      color:white;
      text-decoration:none;
      border-radius:10px;
      display:inline-block;
      margin:8px;
      font-size:15px;
      font-weight:bold;
      transition:0.3s;
    }

    .menu a:hover{
      transform: translateY(-3px);
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    /* อนุบาล */
    .k1{ background:#ffb74d; }
    .k2{ background:#ff9800; }
    .k3{ background:#fb8c00; }

    /* ประถม */
    .p{ background:#42a5f5; }

    /* มัธยมต้น */
    .m{ background:#7e57c2; }

    /* มัธยมปลาย */
    .mhigh{ background:#546e7a; }

  </style>
</head>

<body>

  <div class="container">

    <!-- โลโก้ -->
    <img src="logo.png" alt="โลโก้โรงเรียน" class="logo">

    <h1>ระบบตรวจสอบผลการเรียน โรงเรียนจริยานุสรณ์</h1>
    <div class="subtitle">ภาคเรียนที่ 2 ปีการศึกษา 2568</div>

    <!-- อนุบาล -->
    <div class="section">
      <h2>🧸 ระดับอนุบาล</h2>
      <div class="menu">
        <a href="k1.html" class="k1">อนุบาล 1</a>
        <a href="k2.html" class="k2">อนุบาล 2</a>
        <a href="k3.html" class="k3">อนุบาล 3</a>
      </div>
    </div>

    <!-- ประถม -->
    <div class="section">
      <h2>📘 ระดับประถมศึกษา</h2>
      <div class="menu">
        <a href="p1.html" class="p">ป.1</a>
        <a href="p2.html" class="p">ป.2</a>
        <a href="p3.html" class="p">ป.3</a>
        <a href="p4.html" class="p">ป.4</a>
        <a href="p5.html" class="p">ป.5</a>
        <a href="p6.html" class="p">ป.6</a>
      </div>
    </div>

    <!-- มัธยมต้น -->
    <div class="section">
      <h2>📗 ระดับมัธยมศึกษาตอนต้น</h2>
      <div class="menu">
        <a href="m1.html" class="m">ม.1</a>
        <a href="m2.html" class="m">ม.2</a>
        <a href="m3.html" class="m">ม.3</a>
      </div>
    </div>

    <!-- มัธยมปลาย -->
    <div class="section">
      <h2>🎓 ระดับมัธยมศึกษาตอนปลาย</h2>
      <div class="menu">
        <a href="m4.html" class="mhigh">ม.4</a>
        <a href="m5.html" class="mhigh">ม.5</a>
        <a href="m6.html" class="mhigh">ม.6</a>
      </div>
    </div>

  </div>

</body>
</html>
