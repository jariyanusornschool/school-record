<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบผลการเรียน ม.4</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f6fa;
      text-align:center;
      margin:0;
      padding:0;
    }

    .container{
      width:800px;
      max-width:90%;
      margin:80px auto;
      background:white;
      padding:30px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      border-radius:10px;
    }

    input{
      padding:10px;
      width:70%;
      font-size:16px;
      margin-bottom:10px;
    }

    button{
      padding:10px 20px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      table-layout: fixed;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
    }

    th{
      background:#1976d2;
      color:white;
    }

    .info{
      margin-top:20px;
      font-size:18px;
    }

    .section-title{
      margin-top:30px;
      font-size:22px;
      font-weight:bold;
    }

    /* สีผ่าน/ไม่ผ่าน */
    .pass{
      color:black;
      font-weight:bold;
    }

    .fail{
      color:red;
      font-weight:bold;
    }

    .ms{
      color: red;
      font-weight: bold;
    }

    .absent{
      color: red;
      font-weight: bold;
    }
    
    .logo{
  width:120px;
  margin-bottom:15px;
  border-radius:50%;
}

  </style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">
  <h2>📘 ตรวจสอบผลการเรียน ม.4</h2>

  <input type="text" id="studentId" placeholder="กรอกเลขบัตรประชาชน / รหัสนักเรียน">
  <br>
  <button onclick="searchStudent()">ค้นหา</button>

  <div id="result" style="display:none;">

    <div class="info">
      <p id="studentName"></p>
      <p id="studentYear"></p>
      
    </div>

    

    <!-- ตารางเกรด -->
    <div class="section-title">ผลการเรียนรายวิชา</div>
    <table>
      <thead>
        <tr>
          <th style="width:20%;">รหัสวิชา</th>
          <th style="width:50%;">ชื่อวิชา</th>
          <th style="width:30%;">เกรด</th>
        </tr>
      </thead>
      <tbody id="gradeTableBody"></tbody>
    </table>
    <p><b>GPA :</b> <span id="studentGpa"></span></p>
      <p id="noteRemark" style="color:red; font-size:14px; display:none;">
        *หมายเหตุ : นักเรียนที่มีผลการเรียน "ร", "มส" หรือ "ขส" GPA จะยังไม่สมบูรณ์ จนกว่าจะแก้ไข
      </p>

    <!-- ตารางกิจกรรม -->
    <div class="section-title">ผลการประเมินกิจกรรม</div>
    <table>
      <thead>
        <tr>
          <th style="width:20%;">รหัสกิจกรรม</th>
          <th style="width:50%;">ชื่อกิจกรรม</th>
          <th style="width:30%;">ผลการประเมิน</th>
        </tr>
      </thead>
      <tbody id="activityTableBody"></tbody>
    </table>

  </div>
</div>

<script>
async function searchStudent() {

  const inputId = document.getElementById("studentId").value.trim();

  const [gradeResponse, activityResponse] = await Promise.all([
    fetch("data/m4.json"),
    fetch("data/passfail_m4.json")
  ]);

  const gradeData = await gradeResponse.json();
  const activityData = await activityResponse.json();

  const studentGrades = gradeData.filter(item => String(item.id) === inputId);
  const studentActivities = activityData.filter(item => String(item.id) === inputId);

  const resultDiv = document.getElementById("result");
  const gradeTableBody = document.getElementById("gradeTableBody");
  const activityTableBody = document.getElementById("activityTableBody");

  gradeTableBody.innerHTML = "";
  activityTableBody.innerHTML = "";

  if (studentGrades.length === 0) {
    resultDiv.style.display = "block";
    document.getElementById("studentName").innerText = "❌ ไม่พบข้อมูล";
    document.getElementById("studentYear").innerText = "";
    document.getElementById("studentGpa").innerText = "-";
    return;
  }

  // ข้อมูลนักเรียน
  document.getElementById("studentName").innerText = "ชื่อ: " + studentGrades[0].name;
  document.getElementById("studentYear").innerText = "ชั้น: " + studentGrades[0].year;

  document.getElementById("studentGpa").innerText =
    studentGrades[0].gpa !== undefined && studentGrades[0].gpa !== null
      ? Number(studentGrades[0].gpa).toFixed(2)
      : "-";

  // ✅ เพิ่มตรงนี้
  const note = document.getElementById("noteRemark");

const hasSpecial = studentGrades.some(item => 
  item.remark === "มส" ||
  item.remark === "ขส" ||
  item.grade === "ร" ||
  item.grade === 0 ||
  item.grade === "0"
);

note.style.display = hasSpecial ? "block" : "none";


  // ตารางเกรด
  let gradeRows = "";

studentGrades.forEach(item => {

  let gradeText = "-";
  let className = "";

  // ⭐ priority 1: มส
  if (item.remark === "มส") {
    gradeText = "มส";
    className = "ms";
  } 

  // ⭐ priority 2: ขส
  else if (item.remark === "ขส") {
    gradeText = "ขส";
    className = "absent";
  }

  // ⭐ priority 3: ร (เดิม)
  else if (item.grade === "ร") {
    gradeText = "ร";
    className = "fail";
  } 

  // ⭐ priority 4: grade = 0 → ร
  else if (item.grade === 0 || item.grade === "0") {
    gradeText = "ร";
    className = "fail";
  }

  // ⭐ ปกติ
  else {
    gradeText = item.grade ?? "-";
  }

  gradeRows += `
    <tr>
      <td>${item.subject_code ?? "-"}</td>
      <td>${item.subject_name ?? "-"}</td>
      <td class="${className}">${gradeText}</td>
    </tr>
  `;
});

gradeTableBody.innerHTML = gradeRows;

  // ตารางกิจกรรม
  if (studentActivities.length > 0) {
    let activityRows = "";

    studentActivities.forEach(item => {
      let resultText = item.result ?? "-";
      let className = "";

      if(resultText === "ผ่าน"){
        className = "pass";
        resultText = "ผ่าน";
      }else if(resultText === "ไม่ผ่าน"){
        className = "fail";
        resultText = "ไม่ผ่าน";
      }

      activityRows += `
        <tr>
          <td>${item.subject_code ?? "-"}</td>
          <td>${item.subject_name ?? "-"}</td>
          <td class="${className}">${resultText}</td>
        </tr>
      `;
    });

    activityTableBody.innerHTML = activityRows;

  } else {
    activityTableBody.innerHTML = `
      <tr>
        <td colspan="3">ไม่พบข้อมูลกิจกรรม</td>
      </tr>
    `;
  }

  resultDiv.style.display = "block";
}
</script>

</body>
</html>
