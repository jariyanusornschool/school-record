<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบผลการเรียน</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f6fa;
      text-align:center;
      margin:0;
      padding:0;
    }
    .container{
      width:700px;
      max-width:90%;
      margin:80px auto;
      background:white;
      padding:30px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
      border-radius:10px;
    }
    input{
      padding:10px;
      width:60%;
      margin-top:10px;
      font-size:16px;
    }
    button{
      padding:10px 20px;
      background:#2e7d32;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
      margin-left:8px;
    }
    table{
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
    }
    th,td{
      border:1px solid #ddd;
      padding:8px;
      text-align:center;
    }
    th{
      background:#2e7d32;
      color:white;
    }
    .gpa{
      margin-top:16px;
      font-size:22px;
      font-weight:bold;
      text-align:right;
    }
    .status{
      margin-top:12px;
      color:#666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ตรวจสอบผลการเรียน</h1>

    <input id="searchBox" placeholder="กรอกเลขบัตรประชาชน 13 หลัก">
    <button onclick="searchStudent()">ค้นหา</button>

    <div class="status" id="status">กำลังโหลดข้อมูล...</div>
    <div id="result"></div>
  </div>

  <script>
    let gradeData = [];
let passfailData = [];
let isLoaded = false;

async function loadData() {
  const status = document.getElementById("status");

  try {
    const gradeRes = await fetch('./data/grade_students.json');
    if (!gradeRes.ok) throw new Error('โหลด grade_students.json ไม่สำเร็จ');
    gradeData = (await gradeRes.json()).filter(item => item && item.id);

    const passRes = await fetch('./data/passfail_students.json');
    if (!passRes.ok) throw new Error('โหลด passfail_students.json ไม่สำเร็จ');
    passfailData = (await passRes.json()).filter(item => item && item.id);

    isLoaded = true;
    status.innerHTML = "โหลดข้อมูลเรียบร้อย";
    console.log("gradeData:", gradeData.length);
    console.log("passfailData:", passfailData.length);
  } catch (err) {
    status.innerHTML = "โหลดข้อมูลไม่สำเร็จ";
    console.error(err);
  }
}

    function searchStudent() {
  const result = document.getElementById("result");
  const id = document.getElementById("searchBox").value.trim();

  if (!isLoaded) {
    result.innerHTML = "กรุณารอสักครู่ ระบบกำลังโหลดข้อมูล";
    return;
  }

  if (!id) {
    result.innerHTML = "กรุณากรอกเลขบัตรประชาชน";
    return;
  }

  const grades = gradeData.filter(s => s && String(s.id).trim() === id);
  const passfails = passfailData.filter(s => s && String(s.id).trim() === id);

  if (grades.length === 0 && passfails.length === 0) {
    result.innerHTML = "ไม่พบข้อมูล";
    return;
  }

      const student = grades[0] || passfails[0];

      let html = `
        <h2>${student.name ?? ""}</h2>
        <p>ชั้น ${student.year ?? ""}</p>
      `;

      if (student.gpa !== undefined && student.gpa !== null && student.gpa !== "") {
        html += `<div class="gpa">GPA : ${Number(student.gpa).toFixed(2)}</div>`;
      }

      if (grades.length > 0) {
        html += `
          <h3>ผลการเรียนรายวิชา</h3>
          <table>
            <tr>
              <th>รหัสวิชา</th>
              <th>ชื่อวิชา</th>
              <th>เกรด</th>
            </tr>
        `;

        grades.forEach(g => {
          html += `
            <tr>
              <td>${g.subject_code ?? ""}</td>
              <td>${g.subject_name ?? ""}</td>
              <td>${g.grade ?? ""}</td>
            </tr>
          `;
        });

        html += `</table>`;
  }

  if (passfails.length > 0) {
    html += `
      <h3>ผลการประเมินเพิ่มเติม</h3>
      <table>
        <tr>
          <th>ชื่อรายการ</th>
          <th>ผลการประเมิน</th>
        </tr>
    `;

        passfails.forEach(p => {
          html += `
            <tr>
              <td>${p.subject_name ?? ""}</td>
              <td>${p.result ?? ""}</td>
            </tr>
          `;
        });

        html += `</table>`;
      }
      const hasR = grades.some(g => String(g.grade).trim() === "ร");

html += `
  <div style="margin-top:20px; text-align:right;">
    <span style="font-size:12px; font-weight:bold; text-decoration:underline;">
      *หมายเหตุ : นักเรียนที่มีผลการเรียน "ร" GPA จะยังไม่สมบูรณ์ จนกว่าจะแก้ไข
    </span>
  </div>
`;
}

      result.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
