<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบผลการเรียน ม.3</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f6fa;
      text-align:center;
      margin:0;
      padding:0;
    }

    .container{
      width:800px;
      max-width:90%;
      margin:80px auto;
      background:white;
      padding:30px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      border-radius:10px;
    }

    input{
      padding:10px;
      width:70%;
      font-size:16px;
      margin-bottom:10px;
    }

    button{
      padding:10px 20px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      table-layout: fixed;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
    }

    th{
      background:#ffd700;  /* สีเหลือง */
      color:black;        /* ตัวหนังสือดำ อ่านชัด */
    }
    .info{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
    }

    .semester{
      margin-top:10px;
      font-size:18px;
    }

    .section-title{
      margin-top:30px;
      font-size:22px;
      font-weight:bold;
    }

    /* สีผ่าน/ไม่ผ่าน */
    .pass{
      color:black;
      font-weight:bold;
    }

    .fail{
      color:red;
      font-weight:bold;
    }

    .ms{
      color: red;
      font-weight: bold;
    }

    .absent{
      color: red;
      font-weight: bold;
    }
    
    .logo{
      width:120px;
      margin-bottom:15px;
      border-radius:50%;
    }
    .gpa-text{
      text-align:left;    /* ✅ เปลี่ยนเป็นชิดซ้าย */
      font-weight:bold;
      font-size:18px;
      padding-left:5px;   /* (เสริมให้ตรงกับตาราง) */
    }
    /* รหัสวิชา (คอลัมน์ 1) */
      td:nth-child(1),
      th:nth-child(1){
      text-align:center;
    }

    /* หัวตาราง (ชื่อวิชา) ให้อยู่กลาง */
      th:nth-child(2){
      text-align:center;
    }

    /* ข้อมูลในตาราง (ชื่อวิชา) ให้ชิดซ้าย */
      td:nth-child(2){
      text-align:left;
      padding-left:15px;
    }
    /* เกรด (คอลัมน์ 3) */
      td:nth-child(3),
      th:nth-child(3){
      text-align:center;
    }

  </style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">
  <h2>📘 ตรวจสอบผลการเรียน ม.3</h2>

  <input type="text" id="studentId" placeholder="กรอกเลขบัตรประชาชน">
  <br>
  <button onclick="searchStudent()">ค้นหา</button>

  <div id="result" style="display:none;">

    <div class="info">
  <p id="studentName"></p>
</div>

<div class="semester">
  <p id="studentYear"></p>
</div>

    

    <!-- ตารางเกรด -->
    <table>
      <thead>
        <tr>
          <th style="width:20%;">รหัสวิชา</th>
          <th style="width:50%;">ชื่อวิชา</th>
          <th style="width:30%;">เกรด</th>
        </tr>
      </thead>
      <tbody id="gradeTableBody"></tbody>
    </table>
    <p class="gpa-text"><b>GPA :</b> <span id="studentGpa"></span></p>
      <p id="noteRemark" style="color:red; font-size:18px; text-align:left; padding-left:5px; display:none;">
        *หมายเหตุ : GPA จะถูกคำนวณใหม่ เมื่อแก้ไข ร , มส , ขส เรียบร้อยแล้ว
      </p>

</div>

<script>
async function searchStudent() {

  const inputId = document.getElementById("studentId").value.trim();

  const [gradeResponse, activityResponse] = await Promise.all([
    fetch("data/m3.json"),
    fetch("data/passfail_m3.json")
  ]);

  const gradeData = await gradeResponse.json();
  const activityData = await activityResponse.json();

  const studentGrades = gradeData.filter(item => String(item.id) === inputId);
  const studentActivities = activityData.filter(item => String(item.id) === inputId);

  const resultDiv = document.getElementById("result");
  const gradeTableBody = document.getElementById("gradeTableBody");
  

  gradeTableBody.innerHTML = "";
  

  if (studentGrades.length === 0) {
    resultDiv.style.display = "block";
    document.getElementById("studentName").innerText = "❌ ไม่พบข้อมูล";
    document.getElementById("studentYear").innerText = "";
    document.getElementById("studentGpa").innerText = "-";
    return;
  }

  // ข้อมูลนักเรียน (แก้ตรงนี้)
document.getElementById("studentName").innerText =
  "ชื่อ: " + studentGrades[0].name + "   ชั้น: " + studentGrades[0].year;

document.getElementById("studentYear").innerText =
  "ภาคเรียนที่ 2 ปีการศึกษา 2568";

  document.getElementById("studentGpa").innerText =
    studentGrades[0].gpa !== undefined && studentGrades[0].gpa !== null
      ? Number(studentGrades[0].gpa).toFixed(2)
      : "-";

  // ✅ เพิ่มตรงนี้
  const note = document.getElementById("noteRemark");

const hasSpecial = studentGrades.some(item => 
  item.remark === "มส" ||
  item.remark === "ขส" ||
  item.grade === "ร" ||
  item.grade === 0 ||
  item.grade === "0"
);

note.style.display = hasSpecial ? "block" : "none";


  let gradeRows = "";

/* 🔹 1. วิชาปกติ */
studentGrades.forEach(item => {

  let gradeText = "-";
  let className = "";

  if (item.remark === "มส") {
    gradeText = "มส";
    className = "ms";
  } 
  else if (item.remark === "ขส") {
    gradeText = "ขส";
    className = "absent";
  }
  else if (item.grade === "ร" || item.grade === 0 || item.grade === "0") {
    gradeText = "ร";
    className = "fail";
  }
  else {
    gradeText = item.grade ?? "-";
  }

  gradeRows += `
    <tr>
      <td>${item.subject_code ?? "-"}</td>
      <td>${item.subject_name ?? "-"}</td>
      <td class="${className}">${gradeText}</td>
    </tr>
  `;
});

/* 🔹 2. ต่อด้วยกิจกรรม */
studentActivities.forEach(item => {

  let resultText = "-";
  let className = "";

  if(item.result === "ผ่าน"){
    resultText = "ผ่าน";
    className = "pass";
  }else if(item.result === "ไม่ผ่าน"){
    resultText = "ไม่ผ่าน";
    className = "fail";
  }

  gradeRows += `
    <tr>
      <td>${item.subject_code ?? "-"}</td>
      <td>${item.subject_name ?? "-"}</td>
      <td class="${className}">${resultText}</td>
    </tr>
  `;
});

gradeTableBody.innerHTML = gradeRows;

  resultDiv.style.display = "block";
}
</script>

</body>
</html>
