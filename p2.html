<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบผลการเรียน ป.2</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f6fa;
      text-align:center;
      margin:0;
      padding:0;
    }

    .container{
      width:800px;
      max-width:90%;
      margin:80px auto;
      background:white;
      padding:30px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
      border-radius:10px;
    }

    input{
      padding:10px;
      width:70%;
      font-size:16px;
      margin-bottom:10px;
    }

    button{
      padding:10px 20px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      table-layout: fixed;
    }

    th, td{
      border:1px solid #ddd;
      padding:8px;
    }

    th{
      background:#7CFC00;
      color:black;
    }

    .info{
      margin-top:20px;
      margin-bottom:10px;
      font-size:20px;
      font-weight:bold;
    }

    #studentYear{
      font-size:16px;
      font-weight:normal;
      margin-top:5px;
      margin-bottom:15px;
    }

    .rank-text{
      text-align:left;
      font-weight:bold;
      font-size:18px;
      margin-top:12px;
    }

    .pass{ font-weight:bold; }
    .fail{ color:red; font-weight:bold; }
    .ms{ color:red; font-weight:bold; }
    .absent{ color:red; font-weight:bold; }

    td:nth-child(1), th:nth-child(1){ text-align:center; }
    th:nth-child(2){ text-align:center; }
    td:nth-child(2){ text-align:left; padding-left:15px; }
    td:nth-child(3), th:nth-child(3){ text-align:center; }

    .logo{
      width:120px;
      margin-bottom:15px;
      border-radius:50%;
    }
  </style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">
  <h2>📘 ตรวจสอบผลการเรียน ป.2</h2>

  <input type="text" id="studentId" placeholder="กรอกเลขบัตรประชาชน">
  <br>
  <button onclick="searchStudent()">ค้นหา</button>

  <div id="result" style="display:none;">

    <div class="info">
  <p id="studentInfo"></p>
</div>

<p id="studentYear"></p>
    
    <table>
      <thead>
        <tr>
          <th style="width:20%;">รหัสวิชา</th>
          <th style="width:50%;">ชื่อวิชา</th>
          <th style="width:30%;">เกรด</th>
        </tr>
      </thead>
      <tbody id="gradeTableBody"></tbody>
    </table>

    <p class="rank-text" id="studentRank"></p>

    <p id="noteRemark" style="color:red; font-size:14px; display:none;">
      *หมายเหตุ : นักเรียนที่มีผลการเรียน "ร", "มส" หรือ "ขส" GPA จะยังไม่สมบูรณ์
    </p>

  </div>
</div>

<script>
async function searchStudent() {
  const inputId = document.getElementById("studentId").value.trim();

  const [gradeResponse, activityResponse] = await Promise.all([
    fetch("data/p2.json"),
    fetch("data/passfail_p2.json")
  ]);

  const gradeData = await gradeResponse.json();
  const activityData = await activityResponse.json();

  const studentGrades = gradeData.filter(item => String(item.id) === inputId);
  const studentActivities = activityData.filter(item => String(item.id) === inputId);

  const resultDiv = document.getElementById("result");
  const gradeTableBody = document.getElementById("gradeTableBody");

  gradeTableBody.innerHTML = "";

  if (studentGrades.length === 0) {
    resultDiv.style.display = "block";
    document.getElementById("studentInfo").innerText = "❌ ไม่พบข้อมูล";
    document.getElementById("studentRank").innerText = "-";
    document.getElementById("noteRemark").style.display = "none";
    return;
  }

  const student = studentGrades[0];

  const name = student.name || "-";
  const yearRoom = student.year_room || (student.year && student.room ? `ป.${student.year}/${student.room}` : "-");
  const rank = student.class_rank ?? "-";
  const total = student.total_students ?? "-";

  document.getElementById("studentInfo").innerText =
    `ชื่อ: ${name}   ชั้น: ${yearRoom}`;
  document.getElementById("studentYear").innerText =
  "ภาคเรียนที่ 2 ปีการศึกษา 2568";

  document.getElementById("studentRank").innerText =
    `อันดับที่/ห้อง : ${rank}/${total}`;

  const hasSpecial = studentGrades.some(item =>
    item.remark === "มส" ||
    item.remark === "ขส" ||
    item.grade === "ร" ||
    item.grade === 0 ||
    item.grade === "0"
  );

  document.getElementById("noteRemark").style.display =
    hasSpecial ? "block" : "none";

  let rows = "";

  studentGrades.forEach(item => {
    let gradeText = "-";
    let className = "";

    if (item.remark === "มส") {
      gradeText = "มส";
      className = "ms";
    } else if (item.remark === "ขส") {
      gradeText = "ขส";
      className = "absent";
    } else if (item.grade === "ร" || item.grade === 0 || item.grade === "0") {
      gradeText = "ร";
      className = "fail";
    } else {
      gradeText = item.grade ?? "-";
    }

    rows += `
      <tr>
        <td>${item.subject_code ?? "-"}</td>
        <td>${item.subject_name ?? "-"}</td>
        <td class="${className}">${gradeText}</td>
      </tr>
    `;
  });

  studentActivities.forEach(item => {
    let text = "-";
    let cls = "";

    if (item.result === "ผ่าน") {
      text = "ผ่าน";
      cls = "pass";
    } else if (item.result === "ไม่ผ่าน") {
      text = "ไม่ผ่าน";
      cls = "fail";
    }

    rows += `
      <tr>
        <td>${item.subject_code ?? "-"}</td>
        <td>${item.subject_name ?? "-"}</td>
        <td class="${cls}">${text}</td>
      </tr>
    `;
  });

  gradeTableBody.innerHTML = rows;
  resultDiv.style.display = "block";
}
</script>

</body>
</html>
